syntax = "proto2";
package hw.trezor.messages.crypto;

import "messages-common.proto";
import "options.proto";

// Sugar for easier handling in Java
option java_outer_classname = "TrezorMessageCrypto";
option java_package = "com.satoshilabs.trezor.lib.protobuf";

// Include in BTC-only firmware
option (include_in_bitcoin_only) = true;

/**
 * Request: Ask device to encrypt or decrypt value of given key
 * @start
 * @next CipheredKeyValue
 * @next Failure
 */
message CipherKeyValue {
    repeated uint32 address_n = 1;     // BIP-32 path to derive the key from master node
    required string key = 2;           // key component of key:value
    required bytes value = 3;          // value component of key:value
    optional bool encrypt = 4;         // are we encrypting (True) or decrypting (False)?
    optional bool ask_on_encrypt = 5;  // should we ask on encrypt operation?
    optional bool ask_on_decrypt = 6;  // should we ask on decrypt operation?
    optional bytes iv = 7;             // initialization vector (will be computed if not set)
}

/**
 * Response: Return ciphered/deciphered value
 * @end
 */
message CipheredKeyValue {
    required bytes value = 1;  // ciphered/deciphered value
}

/**
 * Structure representing identity data
 * @embed
 */
message IdentityType {
    optional string proto = 1;                // proto part of URI
    optional string user = 2;                 // user part of URI
    optional string host = 3;                 // host part of URI
    optional string port = 4;                 // port part of URI
    optional string path = 5;                 // path part of URI
    optional uint32 index = 6 [default = 0];  // identity index
}

/**
 * Request: Ask device to sign identity
 * @start
 * @next SignedIdentity
 * @next Failure
 */
message SignIdentity {
    required IdentityType identity = 1;                   // identity
    optional bytes challenge_hidden = 2 [default = ""];   // non-visible challenge
    optional string challenge_visual = 3 [default = ""];  // challenge shown on display (e.g. date+time)
    optional string ecdsa_curve_name = 4;                 // ECDSA curve name to use
}

/**
 * Response: Device provides signed identity
 * @end
 */
message SignedIdentity {
    optional string address = 1;    // identity address
    required bytes public_key = 2;  // identity public key
    required bytes signature = 3;   // signature of the identity data
}

/**
 * Request: Ask device to generate ECDH session key
 * @start
 * @next ECDHSessionKey
 * @next Failure
 */
message GetECDHSessionKey {
    required IdentityType identity = 1;    // identity
    required bytes peer_public_key = 2;    // peer's public key
    optional string ecdsa_curve_name = 3;  // ECDSA curve name to use
}

/**
 * Response: Device provides ECDH session key
 * @end
 */
message ECDHSessionKey {
    required bytes session_key = 1;  // ECDH session key
    optional bytes public_key = 2;   // identity public key
}

/**
 * Request: Ask the device to verify and display a payment notification.
 * @start
 * @next Success
 */
message PaymentNotification {
    optional common.PaymentRequest payment_req = 1;  // SLIP-24 payment request
}

enum KvOperationType {
    KvOperation_Add = 1;
    KvOperation_Update = 2;
    KvOperation_Delete = 3;
}

/**
 * Structure representing a signed KV state head
 * @embed
 */
message KvHead {
    required uint32 schema_version = 1;
    required uint64 seq = 2;
    required bytes records_root = 3;
    optional bytes prev_head_hash = 4;
    required bytes signature = 5;
}

/**
 * Structure representing one sparse Merkle proof
 * @embed
 */
message KvSparseMerkleProof {
    required bytes leaf_key = 1;           // blinded record_id
    optional bytes leaf_hash = 2;          // leaf node hash for inclusion proofs
    repeated bytes sibling_hashes = 3;     // ordered leaf-to-root; or only non-default siblings if sibling_bitmap is set
    required bool exists = 4;              // true=inclusion, false=absence
    optional bytes sibling_bitmap = 5;     // 32-byte MSB-first bitmap; 1=use next sibling_hash, 0=use default empty hash
}

/**
 * Request: Ask device for KV authority public key
 * @start
 * @next KvAuthority
 * @next Failure
 */
message KvGetAuthority {}

/**
 * Response: Device provides KV authority metadata
 * @end
 */
message KvAuthority {
    required uint32 schema_version = 1;
    required bytes public_key = 2;
}

/**
 * Request: Ask device for deterministic blinded record ID
 * @start
 * @next KvRecordId
 * @next Failure
 */
message KvGetRecordId {
    required string key = 1;
}

/**
 * Response: Device provides deterministic record ID
 * @end
 */
message KvRecordId {
    required bytes record_id = 1;
}

/**
 * Request: Ask device to verify a KV transition and sign the new head
 * @start
 * @next KvSignedTransition
 * @next Failure
 */
message KvSignTransition {
    required KvOperationType operation = 1;
    required string key = 2;
    required KvHead old_head = 3;
    optional string old_value = 4;
    optional string new_value = 5;
    required KvSparseMerkleProof proof = 6;
    required bytes proposed_new_root = 7;
}

/**
 * Response: Device provides signed new head
 * @end
 */
message KvSignedTransition {
    required KvHead new_head = 1;
}
